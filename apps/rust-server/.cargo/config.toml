[env]
CC = "clang"
CXX = "clang++"

[alias]
dev-check = "check --features dev"
dev-build = "build --features dev"
dev-test = "test --features dev"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[build]
incremental = false
rustc-wrapper = "sccache"

[profile.dev]
opt-level = 1

[profile.dev.build-override]
opt-level = 3

[profile.release]
codegen-units = 1
lto = "fat"
opt-level = 3
strip = true