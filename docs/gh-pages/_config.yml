title: Relational Wallet
description: >-
  Non-custodial Avalanche wallet secured by Intel SGX enclaves.
  Private keys never leave the hardware boundary.
theme: just-the-docs
repository: Relational-Network/relational-wallet

color_scheme: dark
favicon_ico: /favicon.ico

url: "https://relational-network.github.io"
baseurl: "/relational-wallet"

sass:
  quiet_deps: true
  silence_deprecations: ['import']

aux_links:
  GitHub: "https://github.com/Relational-Network/relational-wallet"
aux_links_new_tab: true

nav_external_links:
  - title: Swagger UI
    url: "https://localhost:8080/docs"
    hide_icon: false

heading_anchors: true
enable_copy_code_button: true

back_to_top: true
back_to_top_text: "Back to top"

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: yellow

plugins:
  - jekyll-seo-tag
  - jekyll-include-cache

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - _site/

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true
  focus_shortcut_key: "k"

footer_content: 'Copyright &copy; 2025-2026 Relational Network. Licensed under <a href="https://github.com/Relational-Network/relational-wallet/blob/main/LICENSE">AGPL-3.0</a>.'

# Custom stylesheet
custom_css:
  - /assets/css/custom.scss
